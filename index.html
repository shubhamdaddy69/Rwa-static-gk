<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>140 Days Hard Challenge — Mock Test Series</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #c9a84c;
    --gold-light: #e8c96a;
    --gold-dim: #8a6f30;
    --bg: #07080f;
    --bg2: #0d0f1c;
    --bg3: #111428;
    --surface: #141830;
    --surface2: #1a2040;
    --border: rgba(201,168,76,0.15);
    --border-active: rgba(201,168,76,0.5);
    --text: #d0d4e8;
    --text-dim: #6a7099;
    --green: #4caf7d;
    --red: #e05c5c;
    --blue: #5c9ae0;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Crimson Pro', Georgia, serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(201,168,76,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(201,168,76,0.04) 1px, transparent 1px);
    background-size: 60px 60px;
    pointer-events: none;
    z-index: 0;
  }

  body::after {
    content: '';
    position: fixed;
    top: -200px;
    left: 50%;
    transform: translateX(-50%);
    width: 800px;
    height: 400px;
    background: radial-gradient(ellipse, rgba(201,168,76,0.06) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .wrapper { position: relative; z-index: 1; max-width: 1200px; margin: 0 auto; padding: 0 24px; }

  /* HEADER */
  header {
    padding: 48px 0 32px;
    text-align: center;
    border-bottom: 1px solid var(--border);
    margin-bottom: 40px;
  }

  .logo-line {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
    margin-bottom: 8px;
  }

  .logo-line .line { height: 1px; width: 80px; background: linear-gradient(90deg, transparent, var(--gold-dim)); }
  .logo-line .line.right { background: linear-gradient(90deg, var(--gold-dim), transparent); }

  h1 {
    font-family: 'Cinzel', serif;
    font-size: clamp(20px, 4vw, 36px);
    font-weight: 700;
    letter-spacing: 0.12em;
    color: var(--gold-light);
    text-shadow: 0 0 40px rgba(201,168,76,0.4);
  }

  .subtitle {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.25em;
    color: var(--text-dim);
    text-transform: uppercase;
    margin-top: 6px;
  }

  .tg-link {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    margin-top: 16px;
    padding: 8px 20px;
    border: 1px solid var(--border);
    border-radius: 100px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--gold);
    text-decoration: none;
    transition: all 0.3s;
    letter-spacing: 0.05em;
  }
  .tg-link:hover {
    border-color: var(--border-active);
    background: rgba(201,168,76,0.05);
    box-shadow: 0 0 20px rgba(201,168,76,0.1);
  }







  /* SECTION LABEL */
  .section-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--text-dim);
    text-align: center;
    margin-bottom: 28px;
  }

  /* MOCK GRID */
  .mock-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    gap: 10px;
    margin-bottom: 60px;
  }

  .mock-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px 14px;
    cursor: pointer;
    transition: all 0.25s;
    position: relative;
    overflow: hidden;
    text-decoration: none;
    display: block;
  }

  .mock-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--gold-dim), transparent);
    opacity: 0;
    transition: opacity 0.3s;
  }

  .mock-card:hover::before { opacity: 1; }

  .mock-card:hover {
    border-color: var(--border-active);
    background: var(--surface2);
    transform: translateY(-2px);
    box-shadow: 0 8px 30px rgba(0,0,0,0.4), 0 0 20px rgba(201,168,76,0.05);
  }

  .mock-card.upcoming {
    opacity: 0.35;
    cursor: not-allowed;
    pointer-events: none;
  }

  .mock-card .mock-num {
    font-family: 'Cinzel', serif;
    font-size: 14px;
    font-weight: 600;
    color: var(--gold-light);
    letter-spacing: 0.08em;
    margin-bottom: 3px;
  }

  .mock-card .mock-sub {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    color: var(--text-dim);
    letter-spacing: 0.1em;
  }

  .mock-card .mock-status {
    position: absolute;
    top: 10px;
    right: 10px;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 6px var(--green);
  }

  .mock-card .mock-status.dim {
    background: var(--text-dim);
    box-shadow: none;
  }

  .mock-card .score-preview {
    margin-top: 8px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    color: var(--gold);
    opacity: 0.85;
    line-height: 1.5;
  }



  footer {
    border-top: 1px solid var(--border);
    padding: 24px 0;
    text-align: center;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 0.1em;
    margin-top: 60px;
  }



  @media (max-width: 600px) {
    .mock-grid  { grid-template-columns: repeat(3, 1fr); }
  }
</style>
</head>
<body>
<div class="wrapper">

  <!-- HEADER -->
  <header>
    <div class="logo-line">
      <span class="line"></span>
      <h1>140 Days Hard Challenge with Shubham</h1>
      <span class="line right"></span>
    </div>
    <div class="subtitle">Mock Test Series &mdash; CGL &bull; CHSL &bull; CPO &bull; STENO</div>
    <a class="tg-link" href="https://t.me/+CLtmPRto-PVjZDQ1" target="_blank">
      ▶ https://t.me/+CLtmPRto-PVjZDQ1
    </a>
  </header>



  <!-- =================== MOCKS PAGE =================== -->
  <div id="page-mocks">

<div class="section-label">— Select Your Mock —</div>

    <!-- MOCK GRID (flat, no phases) -->
    <div class="mock-grid" id="mockGrid"></div>

  </div>



  <footer>© 2025 Shubham's Arena &nbsp;|&nbsp; All Rights Reserved</footer>
</div>



<script>
// ============================================================
// CONFIG: Mocks 1-140 active
// ============================================================
const MOCKS_CONFIG = Array.from({length: 140}, (_, i) => {
  const id = i + 1;
  return {
    id,
    active: id <= 140,
    file: id <= 140 ? `${id}.html` : null
  };
});

// ============================================================
// STORAGE HELPERS
// ============================================================
function getResults() {
  try { return JSON.parse(localStorage.getItem('ssc_results') || '{}'); } catch { return {}; }
}

// ============================================================
// MOCKS PAGE
// ============================================================
function renderMockGrid() {
  const results = getResults();
  const grid = document.getElementById('mockGrid');
  grid.innerHTML = '';

  MOCKS_CONFIG.forEach(m => {
    const res = results[m.id];
    const scoreStr = res
      ? `<div class="score-preview">${res.score !== undefined ? 'Score: '+res.score : ''}${res.correct !== undefined ? ' | '+res.correct+'/'+res.total : ''}</div>`
      : '';

    if (m.active) {
      const el = document.createElement('a');
      el.className = 'mock-card';
      el.href = m.file;
      el.target = '_blank';
      el.innerHTML = `
        <div class="mock-status"></div>
        <div class="mock-num">Mock ${m.id}</div>
        <div class="mock-sub">SSC Series</div>
        ${scoreStr}
      `;
      grid.appendChild(el);
    } else {
      const el = document.createElement('div');
      el.className = 'mock-card upcoming';
      el.innerHTML = `
        <div class="mock-status dim"></div>
        <div class="mock-num">Mock ${m.id}</div>
        <div class="mock-sub">Upcoming</div>
      `;
      grid.appendChild(el);
    }
  });
}

// ============================================================
// INIT
// ============================================================
renderMockGrid();
</script>
</body>
</html>
