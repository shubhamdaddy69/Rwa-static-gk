<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>THE SSC SCHOLARS — Mock Test Series</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #c9a84c;
    --gold-light: #e8c96a;
    --gold-dim: #8a6f30;
    --bg: #07080f;
    --bg2: #0d0f1c;
    --bg3: #111428;
    --surface: #141830;
    --surface2: #1a2040;
    --border: rgba(201,168,76,0.15);
    --border-active: rgba(201,168,76,0.5);
    --text: #d0d4e8;
    --text-dim: #6a7099;
    --green: #4caf7d;
    --red: #e05c5c;
    --blue: #5c9ae0;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Crimson Pro', Georgia, serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(201,168,76,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(201,168,76,0.04) 1px, transparent 1px);
    background-size: 60px 60px;
    pointer-events: none;
    z-index: 0;
  }

  /* Glow orbs */
  body::after {
    content: '';
    position: fixed;
    top: -200px;
    left: 50%;
    transform: translateX(-50%);
    width: 800px;
    height: 400px;
    background: radial-gradient(ellipse, rgba(201,168,76,0.06) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .wrapper { position: relative; z-index: 1; max-width: 1200px; margin: 0 auto; padding: 0 24px; }

  /* HEADER */
  header {
    padding: 48px 0 0;
    text-align: center;
    border-bottom: 1px solid var(--border);
    padding-bottom: 32px;
    margin-bottom: 48px;
  }

  .logo-line {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
    margin-bottom: 8px;
  }

  .logo-line .line {
    height: 1px;
    width: 80px;
    background: linear-gradient(90deg, transparent, var(--gold-dim));
  }
  .logo-line .line.right {
    background: linear-gradient(90deg, var(--gold-dim), transparent);
  }

  h1 {
    font-family: 'Cinzel', serif;
    font-size: clamp(22px, 4vw, 38px);
    font-weight: 700;
    letter-spacing: 0.12em;
    color: var(--gold-light);
    text-shadow: 0 0 40px rgba(201,168,76,0.4);
  }

  .subtitle {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.25em;
    color: var(--text-dim);
    text-transform: uppercase;
    margin-top: 6px;
  }

  .tg-link {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    margin-top: 16px;
    padding: 8px 20px;
    border: 1px solid var(--border);
    border-radius: 100px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--gold);
    text-decoration: none;
    transition: all 0.3s;
    letter-spacing: 0.05em;
  }
  .tg-link:hover {
    border-color: var(--border-active);
    background: rgba(201,168,76,0.05);
    box-shadow: 0 0 20px rgba(201,168,76,0.1);
  }

  /* NAV */
  nav {
    display: flex;
    justify-content: center;
    gap: 8px;
    margin-bottom: 48px;
  }
  nav a {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    padding: 8px 20px;
    border: 1px solid transparent;
    border-radius: 4px;
    color: var(--text-dim);
    text-decoration: none;
    transition: all 0.2s;
  }
  nav a:hover, nav a.active {
    border-color: var(--border-active);
    color: var(--gold);
    background: rgba(201,168,76,0.05);
  }
  nav a.active {
    color: var(--gold-light);
  }

  /* SECTION LABEL */
  .section-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--text-dim);
    text-align: center;
    margin-bottom: 36px;
  }

  /* PHASE BLOCK */
  .phase-block {
    margin-bottom: 48px;
  }

  .phase-header {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 20px;
  }

  .phase-header::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .phase-name {
    font-family: 'Cinzel', serif;
    font-size: 13px;
    letter-spacing: 0.2em;
    color: var(--gold);
    font-weight: 600;
  }

  .phase-badge {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.15em;
    padding: 3px 10px;
    border-radius: 100px;
    text-transform: uppercase;
  }

  .badge-active {
    background: rgba(76,175,125,0.15);
    border: 1px solid rgba(76,175,125,0.4);
    color: var(--green);
  }

  .badge-soon {
    background: rgba(201,168,76,0.08);
    border: 1px solid rgba(201,168,76,0.2);
    color: var(--gold-dim);
  }

  /* MOCK GRID */
  .mock-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 12px;
  }

  .mock-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 20px 18px;
    cursor: pointer;
    transition: all 0.25s;
    position: relative;
    overflow: hidden;
    text-decoration: none;
    display: block;
  }

  .mock-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--gold-dim), transparent);
    opacity: 0;
    transition: opacity 0.3s;
  }

  .mock-card:hover::before { opacity: 1; }

  .mock-card:hover {
    border-color: var(--border-active);
    background: var(--surface2);
    transform: translateY(-2px);
    box-shadow: 0 8px 30px rgba(0,0,0,0.4), 0 0 20px rgba(201,168,76,0.05);
  }

  .mock-card.upcoming {
    opacity: 0.4;
    cursor: not-allowed;
    pointer-events: none;
  }

  .mock-card .mock-num {
    font-family: 'Cinzel', serif;
    font-size: 15px;
    font-weight: 600;
    color: var(--gold-light);
    letter-spacing: 0.08em;
    margin-bottom: 4px;
  }

  .mock-card .mock-phase {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 0.1em;
  }

  .mock-card .mock-status {
    position: absolute;
    top: 10px;
    right: 12px;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 6px var(--green);
  }

  .mock-card .mock-status.upcoming {
    background: var(--text-dim);
    box-shadow: none;
  }

  .mock-card .score-preview {
    margin-top: 10px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--gold);
    opacity: 0.8;
  }

  /* STATS BAR */
  .stats-bar {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    margin-bottom: 48px;
  }

  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px 20px;
    text-align: center;
  }

  .stat-card .stat-val {
    font-family: 'Cinzel', serif;
    font-size: 26px;
    color: var(--gold-light);
    font-weight: 700;
  }

  .stat-card .stat-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.2em;
    color: var(--text-dim);
    text-transform: uppercase;
    margin-top: 4px;
  }

  @media (max-width: 600px) {
    .stats-bar { grid-template-columns: repeat(2, 1fr); }
    .mock-grid { grid-template-columns: repeat(2, 1fr); }
  }

  footer {
    border-top: 1px solid var(--border);
    padding: 24px 0;
    text-align: center;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 0.1em;
    margin-top: 60px;
  }
</style>
</head>
<body>
<div class="wrapper">
  <header>
    <div class="logo-line">
      <span class="line"></span>
      <h1>THE SSC SCHOLARS</h1>
      <span class="line right"></span>
    </div>
    <div class="subtitle">Mock Test Series &mdash; CGL &bull; CHSL &bull; CPO &bull; STENO</div>
    <a class="tg-link" href="https://t.me/thesscscholarsofficial" target="_blank">
      ▶ t.me/thesscscholarsofficial
    </a>
  </header>

  <nav>
    <a href="index.html" class="active">Mocks</a>
    <a href="performance.html">Performance</a>
  </nav>

  <!-- STATS -->
  <div class="stats-bar" id="statsBar">
    <div class="stat-card">
      <div class="stat-val" id="statAttempted">0</div>
      <div class="stat-label">Attempted</div>
    </div>
    <div class="stat-card">
      <div class="stat-val" id="statBestScore">—</div>
      <div class="stat-label">Best Score</div>
    </div>
    <div class="stat-card">
      <div class="stat-val" id="statAvgScore">—</div>
      <div class="stat-label">Avg Score</div>
    </div>
    <div class="stat-card">
      <div class="stat-val" id="statStreak">0</div>
      <div class="stat-label">Day Streak</div>
    </div>
  </div>

  <div class="section-label">— Select Your Mock —</div>

  <!-- PHASES will be rendered by JS -->
  <div id="phasesContainer"></div>

  <footer>© 2025 The SSC Scholars &nbsp;|&nbsp; All Rights Reserved</footer>
</div>

<script>
// ============================================================
// CONFIGURE YOUR MOCKS HERE
// Add entries as: { id: 1, phase: 1, file: 'mocks/mock1.json' }
// ============================================================
const MOCKS_CONFIG = [
  // PHASE 1
  { id: 1,  phase: 1, active: true,  file: 'mocks/mock1.json'  },
  { id: 2,  phase: 1, active: true,  file: 'mocks/mock2.json'  },
  { id: 3,  phase: 1, active: true,  file: 'mocks/mock3.json'  },
  { id: 4,  phase: 1, active: true,  file: 'mocks/mock4.json'  },
  { id: 5,  phase: 1, active: true,  file: 'mocks/mock5.json'  },
  { id: 6,  phase: 1, active: true,  file: 'mocks/mock6.json'  },
  { id: 7,  phase: 1, active: true,  file: 'mocks/mock7.json'  },
  { id: 8,  phase: 1, active: true,  file: 'mocks/mock8.json'  },
  { id: 9,  phase: 1, active: true,  file: 'mocks/mock9.json'  },
  { id: 10, phase: 1, active: true,  file: 'mocks/mock10.json' },
  { id: 11, phase: 1, active: true,  file: 'mocks/mock11.json' },
  // PHASE 2
  { id: 12, phase: 2, active: false, file: 'mocks/mock12.json' },
  { id: 13, phase: 2, active: false, file: 'mocks/mock13.json' },
  { id: 14, phase: 2, active: false, file: 'mocks/mock14.json' },
  { id: 15, phase: 2, active: false, file: 'mocks/mock15.json' },
  // PHASE 3
  { id: 16, phase: 3, active: false, file: 'mocks/mock16.json' },
  { id: 17, phase: 3, active: false, file: 'mocks/mock17.json' },
  { id: 18, phase: 3, active: false, file: 'mocks/mock18.json' },
  { id: 19, phase: 3, active: false, file: 'mocks/mock19.json' },
];

function getResults() {
  try { return JSON.parse(localStorage.getItem('ssc_results') || '{}'); } catch { return {}; }
}

function renderStats() {
  const results = getResults();
  const scores = Object.values(results).map(r => r.score).filter(s => s !== undefined);
  document.getElementById('statAttempted').textContent = scores.length;
  document.getElementById('statBestScore').textContent = scores.length ? Math.max(...scores) : '—';
  document.getElementById('statAvgScore').textContent = scores.length
    ? Math.round(scores.reduce((a,b)=>a+b,0)/scores.length)
    : '—';
  // Simple streak: consecutive days with attempts
  const dates = Object.values(results).map(r => r.date).filter(Boolean).sort().reverse();
  let streak = 0;
  const today = new Date().toDateString();
  let checkDate = new Date();
  for (let i = 0; i < 30; i++) {
    if (dates.includes(checkDate.toDateString())) streak++;
    else if (i > 0) break;
    checkDate.setDate(checkDate.getDate() - 1);
  }
  document.getElementById('statStreak').textContent = streak;
}

function renderPhases() {
  const results = getResults();
  const phases = [...new Set(MOCKS_CONFIG.map(m => m.phase))].sort();
  const container = document.getElementById('phasesContainer');

  phases.forEach(phase => {
    const mocks = MOCKS_CONFIG.filter(m => m.phase === phase);
    const hasActive = mocks.some(m => m.active);

    const block = document.createElement('div');
    block.className = 'phase-block';

    const badge = hasActive
      ? '<span class="phase-badge badge-active">Active</span>'
      : '<span class="phase-badge badge-soon">Coming Soon</span>';

    let cards = mocks.map(m => {
      const res = results[m.id];
      const scoreStr = res ? `<div class="score-preview">Score: ${res.score} | ${res.correct}/${res.total}</div>` : '';
      const dot = m.active ? '<div class="mock-status"></div>' : '<div class="mock-status upcoming"></div>';

      if (m.active) {
        return `<a class="mock-card" href="attempt.html?mock=${m.id}&file=${encodeURIComponent(m.file)}">
          ${dot}
          <div class="mock-num">Mock ${m.id}</div>
          <div class="mock-phase">Phase ${m.phase}</div>
          ${scoreStr}
        </a>`;
      } else {
        return `<div class="mock-card upcoming">
          ${dot}
          <div class="mock-num">Mock ${m.id}</div>
          <div class="mock-phase">Upcoming</div>
        </div>`;
      }
    }).join('');

    block.innerHTML = `
      <div class="phase-header">
        <span class="phase-name">Phase ${phase}</span>
        ${badge}
      </div>
      <div class="mock-grid">${cards}</div>
    `;
    container.appendChild(block);
  });
}

renderStats();
renderPhases();
</script>
</body>
</html>
